    profile:
      - Data professional with experience in data engineering, platform operations, applied analytics, and geospatial modelling.
    experience:
      - company: Spatialedge
        position: Data Scientist - Prepaid Electricity Analytics
        date: 10/2025 - 03/2026
        location: Stellenbosch
        summary: Worked on data and analytics workflows for a prepaid electricity vendor, with a focus on reporting, forecasting, and improving the delivery of production use cases.
        highlights:
          - Contributed across the full lifecycle from data preparation and validation to modelling, reporting, and deployment support in a Google Cloud environment.
          - Built analytics workflows and reporting datasets for prepaid electricity transaction and sales data.
          - Developed Looker Studio dashboards and scheduled service-account notebooks in Vertex AI to support daily business reporting.
          - Redesigned historical backfills for complex SQL preparation layers, replacing slow day-by-day processing with a more efficient query pattern.
          - Modernised the analytics delivery stack between prepared and reporting layers, including forecasting approaches, notebook scheduling, DAG configuration, alerting, and developer automation.

      - company: Spatialedge
        position: Geo-informatics Data Scientist
        date: 08/2025 - 09/2025
        location: Stellenbosch
        summary: Worked on a two-month geo-informatics project modelling traffic congestion trends using Python-based GIS and data science tooling.
        highlights:
          - Modelled traffic congestion trends using geospatial and temporal data.
          - Performed spatial analysis and feature engineering with GeoPandas and related Python libraries, producing geospatial analytics outputs including road-network visualisations, area-specific frequency plots, and forecasts to identify future trends.
          - Developed batched processing strategies for data preparation and analytics that allowed large spatial workloads to run on a virtual machine with limited memory.
          - Cross correlate results with a different strategy using different data.
          - Wrote scripts to standardise and simplify environment setup for the project.

      - company: Spatialedge
        position: Data / DevOps Engineer
        date: 09/2022 - 07/2025
        location: Stellenbosch
        summary: Supported platform operations and data pipelines on a petabyte-scale on-premise Cloudera/Hadoop cluster for the South African subsidiary of a multinational telecommunications provider.
        highlights:
          - Deployed and maintained 16 Apache Airflow instances across multiple teams, environments, and high availability setups on OpenShift (Kubernetes) using Helm.
          - Built software to monitor and facilitate the scheduled archival and removal of hundreds of terabytes of data from development and production Hadoop environments to AWS S3.
          - Developed and maintained tools that automated daily platform health checks and reduced repetitive manual work for engineers.
          - Participated in after-hours and weekend support rotations, including maintenance, patching, and production troubleshooting.

